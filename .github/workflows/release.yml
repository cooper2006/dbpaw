name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (required when manually triggering from a branch)'
        required: false
        type: string

jobs:
  prepare-release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        uses: orhun/git-cliff-action@v4
        id: git_cliff
        with:
          config: cliff.toml
          args: --verbose --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: Create or Update Release Body
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ inputs.tag || github.ref_name }}
          RELEASE_BODY: ${{ steps.git_cliff.outputs.content || 'See the assets to download this version and install.' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.TAG_NAME;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const body = process.env.RELEASE_BODY;
            const releaseName = `DbPaw ${tag}`;
            const manualTag = context.payload?.inputs?.tag;

            if (context.eventName === "workflow_dispatch" && !manualTag) {
              throw new Error("workflow_dispatch requires input 'tag' (e.g. v0.1.5).");
            }

            if (!tag) {
              throw new Error("Tag is empty. For workflow_dispatch, provide the 'tag' input.");
            }

            try {
              const { data: existing } = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });

              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.id,
                tag_name: tag,
                name: releaseName,
                body,
                draft: true,
                prerelease: false,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }

              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: releaseName,
                body,
                draft: true,
                prerelease: false,
              });
            }

  release:
    needs: prepare-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install

      - name: Validate updater signing secrets
        shell: bash
        run: |
          if [ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "Missing secret: TAURI_SIGNING_PRIVATE_KEY"
            exit 1
          fi
          if [ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" ]; then
            echo "Missing secret: TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
            exit 1
          fi

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: 'DbPaw ${{ inputs.tag || github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Upload latest.json artifact
        uses: actions/upload-artifact@v4
        with:
          name: updater-json-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/**/latest.json
          if-no-files-found: error

  merge-updater-json:
    needs: release
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - name: Download updater metadata artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: updater-json-*
          path: updater-json

      - name: Merge latest.json platforms
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t files < <(find updater-json -type f -name latest.json)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No latest.json files found in artifacts."
            exit 1
          fi

          mkdir -p merged
          jq -s '
            reduce .[] as $item (
              {version: null, notes: null, pub_date: null, platforms: {}};
              .version = (.version // $item.version) |
              .notes = (.notes // $item.notes) |
              .pub_date = (.pub_date // $item.pub_date) |
              .platforms += ($item.platforms // {})
            )
          ' "${files[@]}" > merged/latest.json

          echo "Merged platform keys:"
          jq '.platforms | keys' merged/latest.json

      - name: Upload merged latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: merged/latest.json
          draft: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
