name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (required when manually triggering from a branch)'
        required: false
        type: string

jobs:
  prepare-release:
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog
        uses: orhun/git-cliff-action@v4
        id: git_cliff
        with:
          config: cliff.toml
          args: --verbose --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: Create or Update Draft Release
        uses: actions/github-script@v7
        env:
          TAG_NAME: ${{ inputs.tag || github.ref_name }}
          RELEASE_BODY: ${{ steps.git_cliff.outputs.content || 'See the assets to download this version and install.' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = process.env.TAG_NAME;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const body = process.env.RELEASE_BODY;
            const releaseName = `DbPaw ${tag}`;
            const manualTag = context.payload?.inputs?.tag;

            if (context.eventName === "workflow_dispatch" && !manualTag) {
              throw new Error("workflow_dispatch requires input 'tag' (e.g. v0.1.5).")
            }

            if (!tag) {
              throw new Error("Tag is empty. For workflow_dispatch, provide the 'tag' input.")
            }

            try {
              const { data: existing } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: existing.id,
                tag_name: tag,
                name: releaseName,
                body,
                draft: true,
                prerelease: false,
              });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: releaseName,
                body,
                draft: true,
                prerelease: false,
              });
            }

  build:
    needs: prepare-release
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install frontend dependencies
        run: bun install

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build app (artifact only)
        run: bun run tauri build --target ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Resolve artifact paths
        id: paths
        shell: bash
        run: |
          set -euo pipefail

          bundle_dir=""
          if [ -d "src-tauri/target/${{ matrix.target }}/release/bundle" ]; then
            bundle_dir="src-tauri/target/${{ matrix.target }}/release/bundle"
          elif [ -d "src-tauri/target/release/bundle" ]; then
            bundle_dir="src-tauri/target/release/bundle"
          fi

          if [ -z "$bundle_dir" ]; then
            echo "No bundle directory found for target ${{ matrix.target }}"
            find src-tauri/target -maxdepth 6 -type d -name bundle -print || true
            exit 1
          fi

          echo "bundle_dir=$bundle_dir" >> "$GITHUB_OUTPUT"

      - name: Collect updater metadata
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p updater-json

          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is empty. Updater artifacts (latest.json) will not be generated."
            exit 1
          fi

          json_file="$(
            find "${{ steps.paths.outputs.bundle_dir }}" -type f -name latest.json 2>/dev/null | head -n 1 || true
          )"
          if [ -z "$json_file" ]; then
            echo "No latest.json found for target ${{ matrix.target }}"
            echo "Searched in: ${{ steps.paths.outputs.bundle_dir }}"
            find "${{ steps.paths.outputs.bundle_dir }}" -maxdepth 4 -type f -print || true
            exit 1
          fi

          cp "$json_file" "updater-json/latest-${{ matrix.target }}.json"

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.target }}
          path: ${{ steps.paths.outputs.bundle_dir }}/**/*
          if-no-files-found: error

      - name: Upload updater metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: updater-json-${{ matrix.target }}
          path: updater-json/latest-${{ matrix.target }}.json
          if-no-files-found: error

  release:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-22.04

    steps:
      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          path: artifacts
          merge-multiple: true

      - name: Download updater metadata artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: updater-json-*
          path: updater-json

      - name: Merge latest.json platforms
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t files < <(find updater-json -type f -name '*.json')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No updater json files found in artifacts."
            exit 1
          fi

          mkdir -p merged
          jq -s '
            reduce .[] as $item (
              {version: null, notes: null, pub_date: null, platforms: {}};
              .version = (.version // $item.version) |
              .notes = (.notes // $item.notes) |
              .pub_date = (.pub_date // $item.pub_date) |
              .platforms += ($item.platforms // {})
            )
          ' "${files[@]}" > merged/latest.json

          echo "Merged platform keys:"
          jq '.platforms | keys' merged/latest.json

      - name: Remove per-platform latest json assets
        shell: bash
        run: find artifacts -type f -name 'latest*.json' -delete

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          draft: true
          prerelease: false
          overwrite_files: true
          files: |
            artifacts/**/*
            merged/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
